name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  verify-jsr:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get Version
        id: vars
        run: echo "version=$(echo ${{github.ref_name}} | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Build JSR
        run: deno task build:jsr ${{steps.vars.outputs.version}}

      - name: dry run publish
        run: deno publish --dry-run --allow-dirty

  verify-npm:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get Version
        id: vars
        run: echo "version=$(echo ${{github.ref_name}} | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build NPM
        run: deno task build:npm ${{steps.vars.outputs.version}}

      - name: dry run publish
        run: npm publish --dry-run --tag=verify
        working-directory: ./build/npm

      - name: upload build
        uses: actions/upload-artifact@v4
        with:
          name: npm-build
          path: ./build/npm

  publish-npm:
    needs: [verify-jsr, verify-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.com

      - name: download build
        uses: actions/download-artifact@v4
        with:
          name: npm-build
          path: ./build/npm

      - name: Publish NPM
        run: npm publish --access=public --tag=latest --provenance
        working-directory: ./build/npm

  publish-jsr:
    needs: [verify-jsr, verify-npm]
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get Version
        id: vars
        run: echo "version=$(echo ${{github.ref_name}} | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Build JSR
        run: deno task build:jsr ${{steps.vars.outputs.version}}

      - name: Publish JSR
        run: deno publish --allow-dirty
